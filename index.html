<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CB Studios — FiveM Script Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="description" content="Dark-mode technical documentation for CB Studios FiveM scripts: installation, configuration, usage guides and developer references." />
  <meta name="keywords" content="CB Studios, FiveM scripts, FiveM resources, GTA RP, ESX, QBCore, script documentation, installation guide, configuration, exports, events" />
  <meta name="author" content="CB Studios" />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CB Studios — FiveM Script Documentation" />
  <meta property="og:description" content="Official documentation for CB Studios FiveM resources." />
  <meta property="og:image" content="https://docs.pichirincb.com/assets/logo.png" />
  <meta property="og:url" content="https://docs.pichirincb.com/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --brand:       #34b6ff;
      --brand-dim:   #1a82c4;
      --brand-glow:  rgba(52,182,255,0.18);
      --brand-glass: rgba(52,182,255,0.07);

      --bg-base:  #0a0c10;
      --bg-card:  #0f1218;
      --bg-panel: #13161d;
      --bg-hover: #181c26;

      --border:       rgba(255,255,255,0.07);
      --border-brand: rgba(52,182,255,0.35);
      --border-hover: rgba(52,182,255,0.6);

      --text-primary:   #eef2f8;
      --text-secondary: #8a95a8;
      --text-muted:     #4a5162;

      --font-display: 'Space Mono', monospace;
      --font-body:    'DM Sans', sans-serif;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      --sidebar-w: 280px;
      --sidebar-width: var(--sidebar-w);
      --content-offset: 0px;
      --header-h:  56px;
      --banner-h:  0px;
    }

    /* ─── RESET & BASE ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 15px; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ─── SCANLINE TEXTURE ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ─── PAGE LOADER ────────────────────────────────────────── */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-logo {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-brand);
      box-shadow: 0 0 32px var(--brand-glow), 0 0 64px rgba(52,182,255,0.08);
    }

    .loader-logo img { width: 100%; height: 100%; object-fit: cover; }

    .loader-bar-track {
      width: 180px;
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      border-radius: 99px;
      animation: loader-fill 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes loader-fill {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    .loader-label {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── ANNOUNCEMENT BANNER ────────────────────────────────── */
    .announcement-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: none;
      background: linear-gradient(90deg, #0f1e2e 0%, #0d1a2a 100%);
      border-bottom: 1px solid var(--border-brand);
    }

    .announcement-bar.visible { display: flex; align-items: center; justify-content: center; }

    .announcement-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 9px 24px;
      width: 100%;
      max-width: 1200px;
      justify-content: center;
    }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .announcement-icon { font-size: 15px; line-height: 1; }

    .announcement-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--brand);
      text-transform: uppercase;
    }

    .announcement-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .announcement-subtitle a { color: var(--brand); text-decoration: none; }
    .announcement-subtitle a:hover { text-decoration: underline; }

    .announcement-cta {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg-base);
      background: var(--brand);
      padding: 5px 14px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .announcement-cta:hover { opacity: 0.85; }

    /* ─── DOCSIFY SIDEBAR ────────────────────────────────────── */
    .sidebar {
      background: var(--bg-card) !important;
      border-right: 1px solid var(--border) !important;
      padding: 0 !important;
      width: var(--sidebar-w) !important;
    }

    .brand-header {
      padding: 20px 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .sidebar-logo-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
    }

    .sidebar-logo-wrapper img {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-brand);
    }

    .sidebar-logo-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.03em;
    }

    .sidebar-logo-tagline {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-menu-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 20px 6px;
    }

    .sidebar-nav {
      margin: 0 !important;
      padding: 0 12px 18px !important;
      overflow-x: hidden !important;
    }

    .sidebar-nav ul {
      margin: 0 !important;
      padding: 0 !important;
      list-style: none !important;
    }

    .sidebar-nav ul ul {
      padding-left: 8px !important;
    }

    .sidebar-nav li {
      margin: 0 !important;
    }

    /* Sidebar nav items */
    .sidebar-nav li a {
      font-family: var(--font-body) !important;
      font-size: 13px !important;
      color: var(--text-secondary) !important;
      margin: 0 !important;
      padding: 6px 20px !important;
      border-left: 2px solid transparent !important;
      display: block;
      text-decoration: none !important;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
    }

    .sidebar-nav li a:hover {
      color: var(--text-primary) !important;
      background: var(--bg-hover) !important;
      border-left-color: var(--brand-dim) !important;
    }

    .sidebar-nav li.active > a,
    .sidebar-nav li a.active {
      color: var(--brand) !important;
      background: var(--brand-glass) !important;
      border-left-color: var(--brand) !important;
    }

    .sidebar-nav > ul > li > a {
      margin-top: 10px !important;
      margin-bottom: 4px !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      color: #89a0c1 !important;
      text-align: center !important;
    }

    .sidebar-nav > ul > li > ul > li > a {
      padding-left: 14px !important;
      font-size: 13px !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      color: #bdcae0 !important;
    }

    /* Sidebar search */
    .search {
      margin: 4px 0 14px !important;
      padding: 0 !important;
      border: 0 !important;
    }

    .search .input-wrap {
      margin: 0 16px !important;
      background: transparent !important;
      border: 0 !important;
      border-radius: 0 !important;
    }

    .search input {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-md) !important;
      color: var(--text-primary) !important;
      font-family: var(--font-body) !important;
      font-size: 12px !important;
      padding: 8px 12px 8px 32px !important;
      margin: 0 !important;
      width: 100% !important;
      transition: border-color 0.15s, background 0.15s;
    }

    .search input:focus {
      border-color: var(--brand) !important;
      background: var(--bg-base) !important;
      outline: none !important;
    }

    .search input::placeholder { color: var(--text-muted) !important; }

    /* ─── MAIN CONTENT ───────────────────────────────────────── */
    .content {
      padding-top: 32px !important;
      margin-left: var(--content-offset) !important;
      width: calc(100% - var(--content-offset)) !important;
      transform: none !important;
      transition: margin-left 0.2s ease, width 0.2s ease !important;
    }

    @media (min-width: 769px) {
      .markdown-section {
        margin-left: auto !important;
        margin-right: auto !important;
      }
    }

    .markdown-section {
      max-width: 820px !important;
      margin-left: auto !important;
      margin-right: auto !important;
      color: var(--text-primary) !important;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: var(--font-display) !important;
      font-weight: 700 !important;
      letter-spacing: -0.01em;
    }

    .markdown-section h1 {
      font-size: 2rem !important;
      color: var(--text-primary) !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 12px !important;
      margin-bottom: 24px !important;
    }

    .markdown-section h1::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: var(--brand);
      border-radius: 2px;
      margin-top: 10px;
    }

    .markdown-section h1.hero-main-title {
      text-align: center !important;
    }

    .markdown-section h1.hero-main-title::after {
      content: none !important;
      display: none !important;
    }

    .markdown-section .hero-header-wrapper {
      margin-top: -6.5rem !important;
      margin-bottom: 1.8rem !important;
      text-align: center !important;
    }

    .markdown-section .hero-logo-inner img {
      animation: hero-logo-float 6s ease-in-out infinite;
      transform-origin: center center;
      will-change: transform;
    }

    @keyframes hero-logo-float {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .markdown-section .hero-logo-inner img {
        animation: none !important;
      }
    }

    .markdown-section h2 {
      font-size: 1.3rem !important;
      color: var(--text-primary) !important;
      margin-top: 48px !important;
      margin-bottom: 16px !important;
      border-bottom: none !important;
    }

    .markdown-section h3 {
      font-size: 1rem !important;
      color: var(--brand) !important;
      margin-top: 28px !important;
    }

    /* Inline code */
    .markdown-section code:not([class]) {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      color: var(--brand) !important;
      font-family: var(--font-display) !important;
      font-size: 0.82em !important;
      padding: 2px 7px !important;
      border-radius: var(--radius-sm) !important;
    }

    /* Code blocks */
    .markdown-section pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-left: 3px solid var(--brand) !important;
      border-radius: var(--radius-lg) !important;
      padding: 20px 24px !important;
      overflow-x: auto !important;
      position: relative !important;
    }

    .markdown-section pre code {
      font-family: var(--font-display) !important;
      font-size: 0.83rem !important;
      color: var(--text-primary) !important;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    /* Blockquotes */
    .markdown-section blockquote {
      background: var(--brand-glass) !important;
      border-left: 3px solid var(--brand) !important;
      border-radius: 0 var(--radius-md) var(--radius-md) 0 !important;
      padding: 14px 20px !important;
      color: var(--text-secondary) !important;
      margin: 20px 0 !important;
    }

    /* Tables */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse !important;
      font-size: 13px !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
    }

    .markdown-section th {
      background: var(--bg-panel) !important;
      color: var(--text-muted) !important;
      font-family: var(--font-display) !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      padding: 10px 16px !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .markdown-section td {
      padding: 10px 16px !important;
      border-bottom: 1px solid var(--border) !important;
      color: var(--text-secondary) !important;
    }

    .markdown-section tr:last-child td { border-bottom: none !important; }

    .markdown-section tr:hover td {
      background: var(--bg-hover) !important;
      color: var(--text-primary) !important;
    }

    /* Horizontal rule */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 40px 0 !important;
    }

    /* Links */
    .markdown-section a {
      color: var(--brand) !important;
      text-decoration: none !important;
      border-bottom: 1px solid rgba(52,182,255,0.3) !important;
      transition: border-color 0.15s !important;
    }

    .markdown-section a:hover {
      border-bottom-color: var(--brand) !important;
    }

    /* ─── NAVBAR / TOP BAR ───────────────────────────────────── */
    .app-nav {
      background: rgba(10,12,16,0.92) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid var(--border) !important;
      height: var(--header-h) !important;
    }

    /* ─── COPY CODE BUTTON ───────────────────────────────────── */
    .docsify-copy-code-button {
      font-family: var(--font-display) !important;
      font-size: 10px !important;
      letter-spacing: 0.06em !important;
      background: var(--bg-panel) !important;
      color: var(--text-muted) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-sm) !important;
      padding: 4px 10px !important;
      transition: color 0.15s, border-color 0.15s !important;
    }

    .docsify-copy-code-button:hover {
      color: var(--brand) !important;
      border-color: var(--border-brand) !important;
    }

    /* ─── SCROLL BUTTON ──────────────────────────────────────── */
    .scroll-toggle-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-md);
      color: var(--brand);
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 16px var(--brand-glow);
    }

    .scroll-toggle-btn:hover {
      background: var(--brand-glass);
      transform: translateY(-2px);
      box-shadow: 0 0 24px var(--brand-glow);
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .cb-footer {
      margin-top: 80px;
      padding: 32px 0 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 2;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
    }

    .cb-footer-logos {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .cb-footer-logos img {
      height: 22px;
      width: auto;
      opacity: 0.35;
      filter: grayscale(1);
      transition: opacity 0.2s, filter 0.2s;
    }

    .cb-footer-logos img:hover {
      opacity: 0.8;
      filter: none;
    }

    /* ─── BADGE HELPERS (for .md use) ────────────────────────── */
    .badge {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .badge-blue   { background: rgba(52,182,255,0.12); color: var(--brand); border: 1px solid rgba(52,182,255,0.3); }
    .badge-green  { background: rgba(52,220,120,0.12); color: #34dc78;      border: 1px solid rgba(52,220,120,0.3); }
    .badge-orange { background: rgba(255,160,50,0.12);  color: #ffa032;      border: 1px solid rgba(255,160,50,0.3); }
    .badge-red    { background: rgba(255,70,70,0.12);   color: #ff4646;      border: 1px solid rgba(255,70,70,0.3); }

    /* ─── HIDDEN / APP ───────────────────────────────────────── */
    .app-hidden { opacity: 0; transition: opacity 0.4s ease; }
    .app-visible { opacity: 1; }

    /* ─── PRISM OVERRIDES ────────────────────────────────────── */
    .token.comment    { color: #3d5166 !important; }
    .token.keyword    { color: #c792ea !important; }
    .token.string     { color: #c3e88d !important; }
    .token.number     { color: #f78c6c !important; }
    .token.function   { color: #82aaff !important; }
    .token.operator   { color: var(--brand) !important; }
    .token.punctuation{ color: var(--text-muted) !important; }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 240px; }

      .sidebar + .content {
        margin-left: 0 !important;
        width: 100% !important;
      }

      .markdown-section .hero-header-wrapper {
        margin-top: -3.2rem !important;
        margin-bottom: 1.2rem !important;
      }

      .scroll-toggle-btn {
        bottom: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ANNOUNCEMENT BANNER -->
  <div id="announcement-bar" class="announcement-bar"></div>

  <!-- PAGE LOADER -->
  <div id="page-loader" class="page-loader">
    <div class="loader-logo">
      <img src="assets/logo.png" alt="CB Studios" />
    </div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
    <p class="loader-label">Loading docs…</p>
  </div>

  <!-- DOCSIFY ROOT -->
  <div id="app" class="app-hidden">Loading CB Studios documentation…</div>

  <!-- SCROLL TOGGLE -->
  <button id="scroll-toggle-btn" class="scroll-toggle-btn" type="button" aria-label="Scroll">↓</button>

  <!-- DOCSIFY CONFIG -->
  <script>
    window.$docsify = {
      name: "CB Studios",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 3,
      autoHeader: true,
      coverpage: false,
      themeColor: "#34b6ff",
      maxLevel: 4,
      homepage: "home.md",

      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search CB scripts…",
        noData: "No results found.",
        depth: 3
      },

      alias: {
        "/_sidebar.md": "/_sidebar.md",
        "/.*/_sidebar.md": "/_sidebar.md"
      },

      plugins: [
        /* ── SIDEBAR BRAND ── */
        function (hook) {
          hook.doneEach(function () {
            var sidebar = document.querySelector(".sidebar");
            var nav     = document.querySelector(".sidebar-nav");
            if (!sidebar || !nav || document.querySelector(".brand-header")) return;

            var header = document.createElement("div");
            header.className = "brand-header";
            header.innerHTML =
              '<div class="sidebar-logo-wrapper">' +
                '<img src="assets/logo.png" alt="CB Studios Logo" />' +
                '<div>' +
                  '<div class="sidebar-logo-name">CB Studios</div>' +
                  '<div class="sidebar-logo-tagline">FiveM Docs</div>' +
                '</div>' +
              '</div>';
            sidebar.insertBefore(header, sidebar.firstChild);

            var menuLabel = document.createElement("div");
            menuLabel.className = "sidebar-menu-label";
            menuLabel.textContent = "Navigation";
            sidebar.insertBefore(menuLabel, nav);
          });
        },

        /* ── FOOTER ── */
        function (hook) {
          hook.afterEach(function (html, next) {
            next(html +
              '<div class="cb-footer">' +

  <!-- PRISM SYNTAX HIGHLIGHTING -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

  <!-- BANNER CONFIG (external) -->
  <script src="banner-config.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var loader = document.getElementById("page-loader");
      var app    = document.getElementById("app");
      var btn    = document.getElementById("scroll-toggle-btn");

      function syncContentOffset() {
        var sidebar = document.querySelector(".sidebar");
        var isDesktop = window.matchMedia("(min-width: 769px)").matches;
        var isClosed = document.body.classList.contains("close");
        var offset = 0;

        if (isDesktop && sidebar && !isClosed) {
          offset = Math.round(sidebar.getBoundingClientRect().width);
        }

        document.documentElement.style.setProperty("--content-offset", offset + "px");
      }

      if (window.MutationObserver) {
        var bodyObserver = new MutationObserver(syncContentOffset);
        bodyObserver.observe(document.body, { attributes: true, attributeFilter: ["class"] });
      }

      window.addEventListener("resize", syncContentOffset);
      window.addEventListener("hashchange", function () { setTimeout(syncContentOffset, 0); });
      setTimeout(syncContentOffset, 0);
      setTimeout(syncContentOffset, 250);
      setTimeout(syncContentOffset, 1200);

      /* ── SCROLL BUTTON ── */
      if (btn) {
        function atBottom() {
          return window.innerHeight + window.scrollY >= document.body.offsetHeight - 4;
        }
        function syncBtn() {
          btn.textContent = atBottom() ? "↑" : "↓";
          btn.setAttribute("data-dir", atBottom() ? "up" : "down");
        }
        btn.addEventListener("click", function () {
          window.scrollTo({
            top: btn.getAttribute("data-dir") === "up" ? 0 : document.body.scrollHeight,
            behavior: "smooth"
          });
        });
        window.addEventListener("scroll",  syncBtn);
        window.addEventListener("resize",  syncBtn);
        syncBtn();
      }

      /* ── ANNOUNCEMENT BANNER ── */
      if (window.CB_BANNER_CONFIG) {
        var cfg = window.CB_BANNER_CONFIG;
        var bar = document.getElementById("announcement-bar");

        if (cfg.enabled && bar) {
          var inner = document.createElement("div");
          inner.className = "announcement-inner";

          var content = document.createElement("div");
          content.className = "announcement-content";

          if (cfg.icon) {
            var icon = document.createElement("span");
            icon.className = "announcement-icon";
            icon.textContent = cfg.icon;
            content.appendChild(icon);
          }

          var textBlock = document.createElement("div");
          textBlock.style.display = "flex";
          textBlock.style.alignItems = "center";
          textBlock.style.gap = "10px";
          textBlock.style.flexWrap = "wrap";

          if (cfg.title) {
            var title = document.createElement("span");
            title.className = "announcement-title";
            title.textContent = cfg.title;
            textBlock.appendChild(title);
          }

          if (cfg.subtitle) {
            var subtitle = document.createElement("span");
            subtitle.className = "announcement-subtitle";
            subtitle.innerHTML = cfg.subtitle;
            textBlock.appendChild(subtitle);
          }

          content.appendChild(textBlock);
          inner.appendChild(content);

          if (cfg.cta && cfg.cta.enabled && cfg.cta.label && cfg.cta.url) {
            var cta = document.createElement("a");
            cta.className = "announcement-cta";
            cta.href   = cfg.cta.url;
            cta.target = cfg.cta.target || "_blank";
            cta.rel    = "noopener";
            cta.textContent = cfg.cta.label;
            inner.appendChild(cta);
          }

          bar.appendChild(inner);
          bar.classList.add("visible");
          document.documentElement.style.setProperty("--banner-h", bar.offsetHeight + "px");
        }
      }

      /* ── LOADER DISMISS ── */
      setTimeout(function () {
        if (loader) loader.classList.add("hidden");
        if (app) {
          app.classList.remove("app-hidden");
          app.classList.add("app-visible");
        }
      }, 1200);
    });
  </script>
</body>
</html>
