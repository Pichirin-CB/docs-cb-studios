<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CB Studios Docs</title>
  <meta name="description" content="Modern Docsify documentation template for FiveM scripts." />
  <meta name="theme-color" content="#090807" />
  <link rel="icon" type="image/png" sizes="32x32" href="./logo.png" />
  <link rel="shortcut icon" type="image/png" href="./logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./styles/ios.css" />
</head>
<body>
  <div id="app">Loading documentation...</div>

  <script>
    window.$docsify = {
      name: "CB Studios Docs",
      repo: "",
      nameLink: "#/",
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 2,
      auto2top: true,
      maxLevel: 3,
      coverpage: true,
      notFoundPage: true,
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search script, event, export...",
        noData: "No results found"
      },
      copyCode: {
        buttonText: "Copy",
        errorText: "Failed",
        successText: "Copied"
      },
      pagination: {
        previousText: "Previous",
        nextText: "Next",
        crossChapter: true
      },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            const section = document.querySelector(".markdown-section");
            if (!section) return;

            const animatedNodes = section.querySelectorAll(
              "h1, h2, h3, p, ul, ol, pre, table, blockquote, hr"
            );

            animatedNodes.forEach(function (node, index) {
              node.classList.remove("is-visible");
              node.classList.add("reveal-item");
              node.style.setProperty("--stagger", String(index));
            });

            requestAnimationFrame(function () {
              animatedNodes.forEach(function (node) {
                node.classList.add("is-visible");
              });
            });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
