<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CB Studios — FiveM Script Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <meta name="description" content="Dark-mode technical documentation for CB Studios FiveM scripts: installation, configuration, usage guides and developer references." />
  <meta name="keywords" content="CB Studios, FiveM scripts, FiveM resources, GTA RP, ESX, QBCore, script documentation, installation guide, configuration, exports, events" />
  <meta name="author" content="CB Studios" />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CB Studios — FiveM Script Documentation" />
  <meta property="og:description" content="Official documentation for CB Studios FiveM resources." />
  <meta property="og:image" content="https://docs.pichirincb.com/assets/branding/logo.png" />
  <meta property="og:url" content="https://docs.pichirincb.com/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#34b6ff" />
  <link rel="canonical" href="https://docs.pichirincb.com/" />

  <script>
    (function () {
      var saved = localStorage.getItem("cb-theme");
      document.documentElement.setAttribute("data-theme", saved || "dark");
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --brand:       #34b6ff;
      --brand-dim:   #1a82c4;
      --accent-2:     #63e6be;
      --brand-glow:  rgba(52,182,255,0.18);
      --brand-glass: rgba(52,182,255,0.07);

      --bg-base:  #0a0c10;
      --bg-card:  #0f1218;
      --bg-panel: #13161d;
      --bg-hover: #181c26;
      --surface-elevated: rgba(19,22,29,0.82);

      --border:       rgba(255,255,255,0.07);
      --border-brand: rgba(52,182,255,0.35);
      --border-hover: rgba(52,182,255,0.6);

      --text-primary:   #eef2f8;
      --text-secondary: #8a95a8;
      --text-muted:     #4a5162;
      --success: #52d37e;
      --warning: #ffc457;
      --error: #ff6b6b;
      --info: #34b6ff;

      --font-display: 'Space Mono', monospace;
      --font-body:    'DM Sans', sans-serif;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;

      --sidebar-w: 280px;
      --sidebar-width: var(--sidebar-w);
      --content-offset: 0px;
      --header-h:  56px;
      --banner-h:  0px;
      --container: 1120px;
      --shadow-soft: 0 18px 60px rgba(0,0,0,0.24);
      --transition-fast: 0.16s ease;
    }

    :root[data-theme="light"] {
      --brand: #087fc0;
      --brand-dim: #0a6ea8;
      --accent-2: #178d74;
      --brand-glow: rgba(8,127,192,0.14);
      --brand-glass: rgba(8,127,192,0.08);
      --bg-base: #f6f8fb;
      --bg-card: #ffffff;
      --bg-panel: #eef3f8;
      --bg-hover: #e7eef7;
      --surface-elevated: rgba(255,255,255,0.9);
      --border: rgba(15,23,42,0.1);
      --border-brand: rgba(8,127,192,0.32);
      --border-hover: rgba(8,127,192,0.55);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --shadow-soft: 0 18px 60px rgba(15,23,42,0.1);
    }

    /* ─── RESET & BASE ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 15px; }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    :focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 3px;
    }

    /* ─── SCANLINE TEXTURE ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ─── PAGE LOADER ────────────────────────────────────────── */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--bg-base);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-logo {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-brand);
      box-shadow: 0 0 32px var(--brand-glow), 0 0 64px rgba(52,182,255,0.08);
    }

    .loader-logo img { width: 100%; height: 100%; object-fit: cover; }

    .loader-bar-track {
      width: 180px;
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--brand);
      border-radius: 99px;
      animation: loader-fill 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes loader-fill {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    .loader-label {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── ANNOUNCEMENT BANNER ────────────────────────────────── */
    .announcement-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: none;
      background:
        linear-gradient(90deg, rgba(52, 182, 255, 0.08), rgba(52, 182, 255, 0.025)),
        rgba(10, 13, 18, 0.96);
      border-bottom: 1px solid var(--border-brand);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28), 0 0 22px rgba(52, 182, 255, 0.08);
      backdrop-filter: blur(14px);
    }

    .announcement-bar.visible { display: flex; align-items: center; justify-content: center; }

    .announcement-bar--info,
    .announcement-bar--announcement {
      background:
        linear-gradient(90deg, rgba(52, 182, 255, 0.1), rgba(52, 182, 255, 0.025)),
        rgba(10, 13, 18, 0.96);
      border-bottom-color: var(--border-brand);
    }

    .announcement-bar--sale {
      background:
        linear-gradient(90deg, rgba(52, 182, 255, 0.12), rgba(99, 230, 190, 0.045)),
        rgba(10, 13, 18, 0.96);
      border-bottom-color: var(--border-brand);
    }

    .announcement-bar--alert,
    .announcement-bar--warning {
      background:
        linear-gradient(90deg, rgba(255, 196, 87, 0.1), rgba(52, 182, 255, 0.025)),
        rgba(10, 13, 18, 0.96);
      border-bottom-color: rgba(255, 196, 87, 0.45);
    }

    .announcement-bar--maintenance {
      background:
        linear-gradient(90deg, rgba(199, 146, 234, 0.1), rgba(52, 182, 255, 0.025)),
        rgba(10, 13, 18, 0.96);
      border-bottom-color: rgba(199, 146, 234, 0.42);
    }

    .announcement-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 9px 24px;
      width: 100%;
      max-width: 1200px;
      justify-content: center;
    }

    .announcement-inner--compact { max-width: 980px; }
    .announcement-inner--full { max-width: none; }
    .announcement-inner--left { justify-content: space-between; }
    .announcement-inner--center { justify-content: center; }

    .announcement-content {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .announcement-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-sm);
      background: var(--brand-glass);
      box-shadow: 0 0 18px rgba(52, 182, 255, 0.08);
      font-size: 13px;
      line-height: 1;
    }

    .announcement-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--brand);
      text-transform: uppercase;
    }

    .announcement-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .announcement-subtitle a { color: var(--brand); text-decoration: none; }
    .announcement-subtitle a:hover { text-decoration: underline; }

    .announcement-cta {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand);
      background: rgba(52, 182, 255, 0.1);
      border: 1px solid var(--border-brand);
      box-shadow: 0 0 18px rgba(52, 182, 255, 0.08);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .announcement-cta:hover {
      color: var(--text-primary);
      background: rgba(52, 182, 255, 0.18);
      border-color: var(--brand);
      box-shadow: 0 0 24px rgba(52, 182, 255, 0.16);
    }

    /* ─── DOCSIFY SIDEBAR ────────────────────────────────────── */
    .sidebar {
      background: var(--bg-card) !important;
      border-right: 1px solid var(--border) !important;
      padding: 0 !important;
      width: var(--sidebar-w) !important;
      top: var(--banner-h) !important;
      height: calc(100vh - var(--banner-h)) !important;
    }

    .sidebar-toggle {
      top: calc(var(--banner-h) + 10px) !important;
      z-index: 220 !important;
    }

    .brand-header {
      padding: 20px 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .sidebar-logo-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
    }

    .sidebar-logo-wrapper img {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-brand);
    }

    .sidebar-logo-copy {
      display: flex;
      min-height: 36px;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      line-height: 1.2;
    }

    .sidebar-logo-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.03em;
    }

    .sidebar-logo-tagline {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-menu-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 20px 6px;
    }

    .sidebar-nav {
      margin: 0 !important;
      padding: 0 12px 18px !important;
      overflow-x: hidden !important;
    }

    .sidebar-nav ul {
      margin: 0 !important;
      padding: 0 !important;
      list-style: none !important;
    }

    .sidebar-nav ul ul {
      padding-left: 8px !important;
    }

    .sidebar-nav li {
      margin: 0 !important;
    }

    /* Sidebar nav items */
    .sidebar-nav li a {
      font-family: var(--font-body) !important;
      font-size: 13px !important;
      color: var(--text-secondary) !important;
      margin: 0 !important;
      padding: 6px 20px !important;
      border-left: 2px solid transparent !important;
      display: block;
      text-decoration: none !important;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
    }

    .sidebar-nav li a:hover {
      color: var(--text-primary) !important;
      background: var(--bg-hover) !important;
      border-left-color: var(--brand-dim) !important;
    }

    .sidebar-nav li.active > a,
    .sidebar-nav li a.active {
      color: var(--brand) !important;
      background: var(--brand-glass) !important;
      border-left-color: var(--brand) !important;
    }

    .sidebar-nav > ul > li > a {
      margin-top: 10px !important;
      margin-bottom: 4px !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      color: #89a0c1 !important;
      text-align: center !important;
    }

    .sidebar-nav > ul > li > ul > li > a {
      padding-left: 14px !important;
      font-size: 13px !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      color: #bdcae0 !important;
    }

    /* Sidebar search */
    .search {
      margin: 4px 0 14px !important;
      padding: 0 !important;
      border: 0 !important;
    }

    .search .input-wrap {
      margin: 0 16px !important;
      background: transparent !important;
      border: 0 !important;
      border-radius: 0 !important;
    }

    .search input {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-md) !important;
      color: var(--text-primary) !important;
      font-family: var(--font-body) !important;
      font-size: 12px !important;
      padding: 8px 12px 8px 32px !important;
      margin: 0 !important;
      width: 100% !important;
      transition: border-color 0.15s, background 0.15s;
    }

    .search input:focus {
      border-color: var(--brand) !important;
      background: var(--bg-base) !important;
      outline: none !important;
    }

    .search input::placeholder { color: var(--text-muted) !important; }

    /* ─── MAIN CONTENT ───────────────────────────────────────── */
    .content {
      padding-top: calc(32px + var(--banner-h)) !important;
      margin-left: var(--content-offset) !important;
      width: calc(100% - var(--content-offset)) !important;
      transform: none !important;
      transition: margin-left 0.2s ease, width 0.2s ease !important;
    }

    @media (min-width: 769px) {
      .markdown-section {
        margin-left: auto !important;
        margin-right: auto !important;
      }
    }

    .markdown-section {
      max-width: 820px !important;
      margin-left: auto !important;
      margin-right: auto !important;
      color: var(--text-primary) !important;
    }

    /* Headings */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-family: var(--font-display) !important;
      font-weight: 700 !important;
      letter-spacing: -0.01em;
    }

    .markdown-section h1 {
      font-size: 2rem !important;
      color: var(--text-primary) !important;
      border-bottom: 1px solid var(--border) !important;
      padding-bottom: 12px !important;
      margin-bottom: 24px !important;
    }

    .markdown-section h1::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: var(--brand);
      border-radius: 2px;
      margin-top: 10px;
    }

    .markdown-section h1.hero-main-title {
      text-align: center !important;
    }

    .markdown-section h1.hero-main-title::after {
      content: none !important;
      display: none !important;
    }

    .markdown-section .hero-header-wrapper {
      margin-top: -6.5rem !important;
      margin-bottom: 1.8rem !important;
      text-align: center !important;
    }

    .markdown-section .hero-logo-inner img {
      animation: hero-logo-float 6s ease-in-out infinite;
      transform-origin: center center;
      will-change: transform;
    }

    @keyframes hero-logo-float {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-7px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .markdown-section .hero-logo-inner img {
        animation: none !important;
      }
    }

    .markdown-section h2 {
      font-size: 1.3rem !important;
      color: var(--text-primary) !important;
      margin-top: 48px !important;
      margin-bottom: 16px !important;
      border-bottom: none !important;
    }

    .markdown-section h3 {
      font-size: 1rem !important;
      color: var(--brand) !important;
      margin-top: 28px !important;
    }

    /* Inline code */
    .markdown-section code:not([class]) {
      background: var(--bg-panel) !important;
      border: 1px solid var(--border) !important;
      color: var(--brand) !important;
      font-family: var(--font-display) !important;
      font-size: 0.82em !important;
      padding: 2px 7px !important;
      border-radius: var(--radius-sm) !important;
    }

    /* Code blocks */
    .markdown-section pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-left: 3px solid var(--brand) !important;
      border-radius: var(--radius-lg) !important;
      padding: 20px 24px !important;
      overflow-x: auto !important;
      position: relative !important;
    }

    .markdown-section pre code {
      font-family: var(--font-display) !important;
      font-size: 0.83rem !important;
      color: var(--text-primary) !important;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    /* Blockquotes */
    .markdown-section blockquote {
      background: var(--brand-glass) !important;
      border-left: 3px solid var(--brand) !important;
      border-radius: 0 var(--radius-md) var(--radius-md) 0 !important;
      padding: 14px 20px !important;
      color: var(--text-secondary) !important;
      margin: 20px 0 !important;
    }

    /* Tables */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse !important;
      font-size: 13px !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
    }

    .markdown-section th {
      background: var(--bg-panel) !important;
      color: var(--text-muted) !important;
      font-family: var(--font-display) !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      padding: 10px 16px !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .markdown-section td {
      padding: 10px 16px !important;
      border-bottom: 1px solid var(--border) !important;
      color: var(--text-secondary) !important;
    }

    .markdown-section tr:last-child td { border-bottom: none !important; }

    .markdown-section tr:hover td {
      background: var(--bg-hover) !important;
      color: var(--text-primary) !important;
    }

    /* Horizontal rule */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 40px 0 !important;
    }

    /* Links */
    .markdown-section a {
      color: var(--brand) !important;
      text-decoration: none !important;
      border-bottom: 1px solid rgba(52,182,255,0.3) !important;
      transition: border-color 0.15s !important;
    }

    .markdown-section a:hover {
      border-bottom-color: var(--brand) !important;
    }

    /* Changelog experience */
    .changelog-page {
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      margin: 0 auto;
    }

    .changelog-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
      gap: 18px;
      align-items: stretch;
      padding: 24px;
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(52,182,255,0.14), rgba(15,18,24,0.88)),
        var(--bg-card);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28), 0 0 40px rgba(52,182,255,0.08);
      overflow: hidden;
    }

    .changelog-detail-hero {
      margin-top: 8px;
    }

    .changelog-hero-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .changelog-kicker,
    .changelog-section-eyebrow,
    .changelog-meta-label,
    .changelog-resource-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand);
    }

    .changelog-title {
      margin: 8px 0 12px !important;
      padding: 0 !important;
      border: 0 !important;
      font-family: var(--font-display) !important;
      font-size: clamp(2.2rem, 6vw, 4.4rem) !important;
      line-height: 0.95 !important;
      color: var(--text-primary) !important;
    }

    .changelog-title::after {
      content: none !important;
      display: none !important;
    }

    .changelog-lead {
      max-width: 620px;
      margin: 0 !important;
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
    }

    .changelog-hero-panel,
    .changelog-meta,
    .changelog-card,
    .changelog-section,
    .changelog-version-index {
      border: 1px solid var(--border);
      background: rgba(15,18,24,0.72);
      backdrop-filter: blur(14px);
      box-shadow: 0 14px 38px rgba(0,0,0,0.18);
    }

    .changelog-hero-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      border-radius: var(--radius-lg);
    }

    .changelog-hero-version {
      font-family: var(--font-display);
      font-size: 2rem;
      line-height: 1;
      color: var(--text-primary);
    }

    .changelog-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .changelog-meta {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      border-radius: var(--radius-lg);
    }

    .changelog-meta-value {
      overflow-wrap: anywhere;
      color: var(--text-primary);
      font-size: 1rem;
    }

    .changelog-version-index {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      border-radius: var(--radius-xl);
    }

    .changelog-section-heading {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .changelog-section-title,
    .changelog-card-title,
    .changelog-section-name {
      margin: 0 !important;
      font-family: var(--font-display) !important;
      color: var(--text-primary) !important;
      line-height: 1.25 !important;
    }

    .changelog-section-title {
      font-size: 1.05rem !important;
    }

    .changelog-version-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-md);
      background: var(--bg-panel);
      color: var(--text-primary) !important;
      text-decoration: none !important;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .changelog-version-link:hover {
      transform: translateY(-1px);
      border-color: var(--border-brand) !important;
      background: var(--bg-hover);
    }

    .changelog-version-link-main {
      flex: 0 0 auto;
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--brand);
    }

    .changelog-version-link-detail {
      min-width: 0;
      color: var(--text-secondary);
      text-align: right;
      overflow-wrap: anywhere;
    }

    .changelog-card {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
      border-radius: var(--radius-xl);
    }

    .changelog-card-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .changelog-card-title {
      margin-top: 8px !important;
      font-size: 1.7rem !important;
    }

    .changelog-badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid var(--border-brand);
      border-radius: 999px;
      background: var(--brand-glass);
      color: var(--brand);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .changelog-badge-latest {
      background: rgba(52,182,255,0.16);
      box-shadow: 0 0 24px rgba(52,182,255,0.1);
    }

    .changelog-date {
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 0.82rem;
    }

    .changelog-resource {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: rgba(19,22,29,0.68);
    }

    .changelog-resource-link,
    .changelog-inline-link {
      color: var(--brand) !important;
      font-weight: 700;
      border-bottom: 1px solid rgba(52,182,255,0.35) !important;
      text-decoration: none !important;
    }

    .changelog-resource-link:hover,
    .changelog-inline-link:hover {
      border-bottom-color: var(--brand) !important;
    }

    .changelog-summary {
      margin: 0 !important;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .changelog-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .changelog-section {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 10px;
      padding: 18px;
      border-radius: var(--radius-lg);
    }

    .changelog-warning {
      border-color: rgba(255,196,87,0.35);
      background: rgba(37,28,12,0.45);
    }

    .changelog-section-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-panel);
    }

    .changelog-section-name {
      font-size: 1rem !important;
    }

    .changelog-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 0 !important;
      padding-left: 18px !important;
      color: var(--text-secondary);
    }

    .changelog-list li {
      margin: 0 !important;
      line-height: 1.55;
    }

    .changelog-page code {
      background: var(--bg-base) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-sm);
      color: var(--brand) !important;
      padding: 1px 5px !important;
      white-space: normal;
    }

    .changelog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .changelog-actions-final {
      justify-content: center;
      margin-top: 6px;
    }

    .changelog-button,
    .changelog-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 44px;
      padding: 0.75rem 1.1rem;
      border: 1px solid var(--border-brand) !important;
      border-radius: var(--radius-md);
      background: var(--bg-panel);
      color: var(--brand) !important;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      text-decoration: none !important;
      text-transform: uppercase;
      white-space: nowrap;
      transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .markdown-section .changelog-button,
    .markdown-section .changelog-button:hover {
      color: var(--brand) !important;
      border-bottom: 1px solid var(--border-brand) !important;
    }

    .markdown-section .changelog-back,
    .markdown-section .changelog-back:hover {
      color: var(--brand) !important;
      border-bottom: 1px solid var(--border-brand) !important;
    }

    .changelog-button-secondary {
      background: var(--bg-panel);
      color: var(--brand) !important;
    }

    .markdown-section .changelog-button-secondary,
    .markdown-section .changelog-button-secondary:hover {
      color: var(--brand) !important;
    }

    .changelog-button:hover,
    .changelog-back:hover {
      transform: translateY(-1px);
      opacity: 0.92;
      box-shadow: 0 12px 28px rgba(52,182,255,0.18);
    }

    .changelog-back {
      align-self: flex-start;
      background: var(--bg-panel);
      color: var(--brand) !important;
    }

    /* ─── NAVBAR / TOP BAR ───────────────────────────────────── */
    .app-nav {
      background: rgba(10,12,16,0.92) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid var(--border) !important;
      height: var(--header-h) !important;
    }

    /* ─── COPY CODE BUTTON ───────────────────────────────────── */
    .docsify-copy-code-button {
      font-family: var(--font-display) !important;
      font-size: 10px !important;
      letter-spacing: 0.06em !important;
      background: var(--bg-panel) !important;
      color: var(--text-muted) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-sm) !important;
      padding: 4px 10px !important;
      transition: color 0.15s, border-color 0.15s !important;
    }

    .docsify-copy-code-button:hover {
      color: var(--brand) !important;
      border-color: var(--border-brand) !important;
    }

    /* ─── SCROLL BUTTON ──────────────────────────────────────── */
    .scroll-toggle-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-md);
      color: var(--brand);
      font-size: 16px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 16px var(--brand-glow);
    }

    .scroll-toggle-btn:hover {
      background: var(--brand-glass);
      transform: translateY(-2px);
      box-shadow: 0 0 24px var(--brand-glow);
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .cb-footer {
      margin-top: 80px;
      padding: 32px 0 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 2;
      font-family: var(--font-display);
      letter-spacing: 0.02em;
    }

    .cb-footer-logos {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .cb-footer-logos img {
      height: 22px;
      width: auto;
      opacity: 0.35;
      filter: grayscale(1);
      transition: opacity 0.2s, filter 0.2s;
    }

    .cb-footer-logos img:hover {
      opacity: 0.8;
      filter: none;
    }

    /* ─── BADGE HELPERS (for .md use) ────────────────────────── */
    .badge {
      display: inline-block;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .badge-blue   { background: rgba(52,182,255,0.12); color: var(--brand); border: 1px solid rgba(52,182,255,0.3); }
    .badge-green  { background: rgba(52,220,120,0.12); color: #34dc78;      border: 1px solid rgba(52,220,120,0.3); }
    .badge-orange { background: rgba(255,160,50,0.12);  color: #ffa032;      border: 1px solid rgba(255,160,50,0.3); }
    .badge-red    { background: rgba(255,70,70,0.12);   color: #ff4646;      border: 1px solid rgba(255,70,70,0.3); }

    /* ─── PRODUCT HUB COMPONENTS ─────────────────────────────── */
    .markdown-section { max-width: var(--container) !important; }

    .hub-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(240px, 0.55fr);
      gap: 24px;
      align-items: stretch;
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 20% 0%, var(--brand-glass), transparent 34%),
        linear-gradient(135deg, var(--surface-elevated), var(--bg-card));
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .hub-hero h1 {
      margin: 12px 0 16px !important;
      padding: 0 !important;
      border: 0 !important;
      font-size: clamp(2rem, 5vw, 4rem) !important;
      line-height: 1.02 !important;
      letter-spacing: 0 !important;
    }

    .hub-hero h1::after { display: none !important; }

    .hub-hero p,
    .support-cta p,
    .docs-panel p,
    .category-card p,
    .product-card p {
      color: var(--text-secondary);
    }

    .hub-kicker {
      display: inline-flex;
      width: fit-content;
      padding: 6px 10px;
      border: 1px solid var(--border-brand);
      border-radius: 999px;
      background: var(--brand-glass);
      color: var(--brand);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hub-actions,
    .product-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 22px;
    }

    .docs-button,
    .markdown-section .docs-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--border-brand) !important;
      border-radius: var(--radius-md);
      background: var(--bg-panel);
      color: var(--brand) !important;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none !important;
      border-bottom: 1px solid var(--border-brand) !important;
      transition: var(--transition-fast);
    }

    .docs-button:hover {
      transform: translateY(-1px);
      background: var(--brand-glass);
      color: var(--text-primary) !important;
      border-color: var(--brand) !important;
    }

    .docs-button--primary {
      background:
        linear-gradient(180deg, rgba(52, 182, 255, 0.14), rgba(52, 182, 255, 0.08)),
        var(--bg-panel) !important;
      color: var(--text-primary) !important;
      border-color: var(--border-brand) !important;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 0 18px var(--brand-glow);
    }

    .docs-button--primary:hover,
    .docs-button--primary:focus-visible {
      background:
        linear-gradient(180deg, rgba(52, 182, 255, 0.2), rgba(52, 182, 255, 0.1)),
        var(--bg-hover) !important;
      color: var(--text-primary) !important;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 0 26px var(--brand-glow);
    }

    .docs-button--ghost {
      border-color: var(--border) !important;
      color: var(--text-secondary) !important;
    }

    .hub-hero__panel,
    .docs-panel,
    .category-card,
    .product-card,
    .support-cta,
    .docs-callout {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-soft);
    }

    .hub-hero__panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      min-height: 300px;
      padding: clamp(18px, 3vw, 28px);
      text-align: center;
      background:
        radial-gradient(circle at center, rgba(52,182,255,0.12), transparent 58%),
        var(--surface-elevated);
    }

    .hub-hero__panel img {
      display: block;
      width: min(100%, 260px);
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-brand);
      box-shadow: 0 0 28px var(--brand-glow);
    }

    .hub-hero__panel strong,
    .category-card strong,
    .docs-panel strong,
    .product-card h3 {
      color: var(--text-primary);
      font-family: var(--font-display);
    }

    .hub-hero__panel span { display: block; color: var(--text-muted); }

    .value-strip,
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0;
    }

    .value-strip span,
    .product-badge,
    .filter-button {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-panel);
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .category-grid,
    .docs-feature-grid,
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
      margin: 18px 0;
    }

    .category-card,
    .product-card,
    .docs-panel {
      padding: 18px;
      text-decoration: none !important;
      border-bottom: 1px solid var(--border) !important;
      transition: var(--transition-fast);
    }

    .category-card {
      display: block;
    }

    .category-card:hover,
    .product-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-brand);
      background: var(--bg-card);
    }

    .category-card__icon {
      display: inline-flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      margin: 0 10px 14px 0;
      vertical-align: middle;
      border: 1px solid var(--border-brand);
      border-radius: var(--radius-md);
      background:
        linear-gradient(180deg, rgba(52,182,255,0.14), rgba(52,182,255,0.06)),
        var(--bg-panel);
      color: var(--brand);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 0 18px var(--brand-glow);
    }

    .category-card__icon img {
      display: block;
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .category-card strong {
      display: inline-block;
      margin: 0 0 14px !important;
      vertical-align: middle;
      line-height: 1.2;
    }

    .category-card p {
      margin: 0 !important;
      line-height: 1.6;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100%;
    }

    .product-card h3 {
      margin: 0 !important;
      font-size: 1rem !important;
    }

    .product-card p {
      margin: 0 !important;
      line-height: 1.6;
    }

    .product-card .product-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: auto;
      padding-top: 14px;
    }

    .product-card .docs-button {
      width: 100%;
      min-width: 0;
      padding-inline: 10px;
    }

    .product-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .product-badge--paid { color: var(--warning); border-color: rgba(255,196,87,0.35); }
    .product-badge--free { color: var(--success); border-color: rgba(82,211,126,0.35); }
    .product-badge--status { color: var(--brand); border-color: var(--border-brand); }

    .filter-button {
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .filter-button.active,
    .filter-button:hover {
      color: var(--brand);
      border-color: var(--border-brand);
      background: var(--brand-glass);
    }

    .page-nav-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 48px 0 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .support-cta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      padding: 24px;
      margin-top: 22px;
    }

    .docs-callout {
      padding: 16px 18px;
      margin: 18px 0;
      border-left: 3px solid var(--brand);
    }

    .docs-callout strong {
      display: block;
      color: var(--text-primary);
      font-family: var(--font-display);
      margin-bottom: 4px;
    }

    .docs-callout p { margin: 0 !important; color: var(--text-secondary); }
    .docs-callout--warning { border-left-color: var(--warning); }
    .docs-callout--danger { border-left-color: var(--error); }
    .docs-callout--success { border-left-color: var(--success); }
    .docs-callout--tip { border-left-color: var(--accent-2); }
    .docs-callout--important { border-left-color: var(--warning); }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      margin-left: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-panel);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .theme-toggle:hover {
      color: var(--brand);
      border-color: var(--border-brand);
      background: var(--brand-glass);
    }

    .announcement-dismiss {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-panel);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .announcement-dismiss:hover {
      color: var(--text-primary);
      border-color: var(--border-brand);
      background: var(--brand-glass);
    }

    .markdown-section pre::before {
      content: attr(data-lang);
      position: absolute;
      top: 6px;
      right: 12px;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 9px;
      text-transform: uppercase;
    }

    .cb-footer {
      padding: 32px !important;
      border-radius: var(--radius-xl);
      background: var(--surface-elevated);
      box-shadow: var(--shadow-soft);
    }

    .cb-footer-grid {
      display: grid;
      grid-template-columns: 1.4fr repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .cb-footer-title {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
    }

    .cb-footer a {
      display: block;
      color: var(--text-secondary) !important;
      border: 0 !important;
      text-decoration: none !important;
    }

    .cb-footer a:hover { color: var(--brand) !important; }

    /* ─── HIDDEN / APP ───────────────────────────────────────── */
    .app-hidden { opacity: 0; transition: opacity 0.4s ease; }
    .app-visible { opacity: 1; }

    /* ─── PRISM OVERRIDES ────────────────────────────────────── */
    .token.comment    { color: #3d5166 !important; }
    .token.keyword    { color: #c792ea !important; }
    .token.string     { color: #c3e88d !important; }
    .token.number     { color: #f78c6c !important; }
    .token.function   { color: #82aaff !important; }
    .token.operator   { color: var(--brand) !important; }
    .token.punctuation{ color: var(--text-muted) !important; }

    /* ─── LIGHT THEME CONTRAST FIXES ─────────────────────────── */
    :root[data-theme="light"] {
      --theme-color: var(--brand);
      --base-background-color: var(--bg-base);
      --base-color: var(--text-primary);
      --sidebar-background: var(--bg-card);
      --sidebar-nav-link-color: var(--text-secondary);
      --sidebar-nav-link-color--active: var(--brand);
      --sidebar-nav-link-color--hover: var(--text-primary);
      --search-input-background-color: var(--bg-panel);
      --search-input-color: var(--text-primary);
      --code-theme-background: var(--bg-card);
    }

    :root[data-theme="light"] body,
    :root[data-theme="light"] .content,
    :root[data-theme="light"] .markdown-section {
      background: var(--bg-base) !important;
      color: var(--text-primary) !important;
    }

    :root[data-theme="light"] .sidebar {
      background: var(--bg-card) !important;
      box-shadow: 12px 0 34px rgba(15,23,42,0.05);
    }

    :root[data-theme="light"] .sidebar-nav > ul > li > a {
      color: #334155 !important;
    }

    :root[data-theme="light"] .sidebar-nav > ul > li > ul > li > a {
      color: #475569 !important;
    }

    :root[data-theme="light"] .sidebar-nav li a:hover {
      color: #0f172a !important;
      background: #eef6fc !important;
    }

    :root[data-theme="light"] .sidebar-nav li.active > a,
    :root[data-theme="light"] .sidebar-nav li a.active {
      color: #075985 !important;
      background: #e7f5ff !important;
    }

    :root[data-theme="light"] .docs-button,
    :root[data-theme="light"] .markdown-section .docs-button {
      background: #ffffff !important;
      color: #075985 !important;
      border-color: rgba(8,127,192,0.38) !important;
      box-shadow: 0 8px 20px rgba(15,23,42,0.06);
    }

    :root[data-theme="light"] .docs-button:hover,
    :root[data-theme="light"] .docs-button:focus-visible {
      background: #e7f5ff !important;
      color: #0f172a !important;
      border-color: var(--brand) !important;
    }

    :root[data-theme="light"] .docs-button--primary {
      background:
        linear-gradient(180deg, rgba(8,127,192,0.16), rgba(8,127,192,0.08)),
        #ffffff !important;
      color: #0f172a !important;
    }

    :root[data-theme="light"] .docs-button--ghost {
      color: #334155 !important;
      border-color: rgba(15,23,42,0.14) !important;
    }

    :root[data-theme="light"] .product-badge,
    :root[data-theme="light"] .filter-button,
    :root[data-theme="light"] .value-strip span {
      background: #ffffff !important;
      color: #334155 !important;
      border-color: rgba(15,23,42,0.14) !important;
    }

    :root[data-theme="light"] .filter-button.active,
    :root[data-theme="light"] .filter-button:hover {
      color: #075985 !important;
      background: #e7f5ff !important;
      border-color: rgba(8,127,192,0.38) !important;
    }

    :root[data-theme="light"] .hub-hero,
    :root[data-theme="light"] .hub-hero__panel,
    :root[data-theme="light"] .docs-panel,
    :root[data-theme="light"] .category-card,
    :root[data-theme="light"] .product-card,
    :root[data-theme="light"] .support-cta,
    :root[data-theme="light"] .docs-callout,
    :root[data-theme="light"] .cb-footer {
      background: rgba(255,255,255,0.94) !important;
      border-color: rgba(15,23,42,0.1) !important;
    }

    :root[data-theme="light"] .category-card:hover,
    :root[data-theme="light"] .product-card:hover {
      background: #ffffff !important;
      border-color: rgba(8,127,192,0.32) !important;
    }

    :root[data-theme="light"] .markdown-section code:not([class]),
    :root[data-theme="light"] .markdown-section pre,
    :root[data-theme="light"] .markdown-section th {
      background: #eef3f8 !important;
    }

    :root[data-theme="light"] .markdown-section pre code {
      color: #111827 !important;
    }

    :root[data-theme="light"] .changelog-hero {
      background:
        linear-gradient(135deg, rgba(8,127,192,0.12), rgba(255,255,255,0.96)),
        var(--bg-card) !important;
      box-shadow: var(--shadow-soft);
    }

    :root[data-theme="light"] .cb-footer-logos img {
      opacity: 0.62;
      filter: none;
    }

    :root[data-theme="light"] .theme-toggle,
    :root[data-theme="light"] .announcement-dismiss,
    :root[data-theme="light"] .scroll-toggle-btn {
      background: #ffffff !important;
      color: #075985 !important;
      border-color: rgba(8,127,192,0.32) !important;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 240px; }

      .sidebar + .content {
        margin-left: 0 !important;
        width: 100% !important;
      }

      .sidebar-toggle {
        top: calc(var(--banner-h) + 8px) !important;
      }

      .markdown-section .hero-header-wrapper {
        margin-top: -3.2rem !important;
        margin-bottom: 1.2rem !important;
      }

      .scroll-toggle-btn {
        bottom: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        font-size: 14px;
      }

      .changelog-hero,
      .changelog-meta-grid,
      .changelog-grid {
        grid-template-columns: 1fr;
      }

      .changelog-hero {
        padding: 18px;
      }

      .changelog-card,
      .changelog-version-index {
        padding: 16px;
      }

      .changelog-card-header,
      .changelog-version-link {
        flex-direction: column;
        align-items: flex-start;
      }

      .changelog-version-link-detail {
        text-align: left;
      }

      .changelog-actions,
      .changelog-actions-final {
        justify-content: stretch;
      }

      .changelog-button,
      .changelog-back {
        width: 100%;
      }

      .hub-hero,
      .category-grid,
      .docs-feature-grid,
      .product-grid,
      .support-cta,
      .cb-footer-grid {
        grid-template-columns: 1fr;
      }

      .announcement-inner {
        align-items: flex-start;
        flex-direction: column;
        padding: 10px 54px 10px 14px;
      }

      .announcement-dismiss {
        position: absolute;
        top: 10px;
        right: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- ANNOUNCEMENT BANNER -->
  <div id="announcement-bar" class="announcement-bar"></div>

  <!-- PAGE LOADER -->
  <div id="page-loader" class="page-loader">
    <div class="loader-logo">
      <img src="assets/branding/logo.png" alt="CB Studios" />
    </div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
    <p class="loader-label">Loading docs…</p>
  </div>

  <!-- DOCSIFY ROOT -->
  <div id="app" class="app-hidden">Loading CB Studios documentation…</div>

  <!-- SCROLL TOGGLE -->
  <button id="scroll-toggle-btn" class="scroll-toggle-btn" type="button" aria-label="Scroll">↓</button>

  <!-- DOCSIFY CONFIG -->
  <script>
    window.$docsify = {
      name: "CB Studios",
      repo: "",
      loadSidebar: true,
      subMaxLevel: 3,
      autoHeader: true,
      coverpage: false,
      notFoundPage: true,
      themeColor: "#34b6ff",
      maxLevel: 4,
      homepage: "home.md",

      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search CB scripts…",
        noData: "No results found.",
        depth: 3
      },

      alias: {
        "/_sidebar.md": "/_sidebar.md",
        "/.*/_sidebar.md": "/_sidebar.md"
      },

      plugins: [
        /* ── SIDEBAR BRAND ── */
        function (hook) {
          hook.doneEach(function () {
            var sidebar = document.querySelector(".sidebar");
            var nav     = document.querySelector(".sidebar-nav");
            if (!sidebar || !nav || document.querySelector(".brand-header")) return;

            var header = document.createElement("div");
            header.className = "brand-header";
            header.innerHTML =
              '<div class="sidebar-logo-wrapper">' +
                '<img src="assets/branding/logo.png" alt="CB Studios Logo" />' +
                '<div class="sidebar-logo-copy">' +
                  '<div class="sidebar-logo-name">CB Studios</div>' +
                  '<div class="sidebar-logo-tagline">FiveM Docs</div>' +
                '</div>' +
                '<button class="theme-toggle" type="button" aria-label="Toggle light and dark theme">◐</button>' +
              '</div>';
            sidebar.insertBefore(header, sidebar.firstChild);

            var menuLabel = document.createElement("div");
            menuLabel.className = "sidebar-menu-label";
            menuLabel.textContent = "Navigation";
            sidebar.insertBefore(menuLabel, nav);
          });
        },

        /* ── FOOTER ── */
        function (hook) {
          hook.afterEach(function (html, next) {
            next(html +
              '<div class="page-nav-actions">' +
                '<button class="docs-button" type="button" data-page-back>Back</button>' +
                '<a class="docs-button" href="#/home">Home</a>' +
                '<a class="docs-button docs-button--ghost" href="#/products">All Products</a>' +
              '</div>' +
              '<div class="cb-footer">' +
                '<div class="cb-footer-grid">' +
                  '<div>' +
                    '<div class="cb-footer-title">CB Studios</div>' +
                    '&copy; 2025–2026 CB Studios. All Rights Reserved.<br>' +
                    'Not affiliated with Rockstar Games.<br>' +
                    'All scripts, source code, documentation, images, audio, branding and digital assets are protected by copyright.<br>' +
                    'Unauthorized redistribution, resale, publication or reverse engineering is prohibited.' +
                  '</div>' +
                  '<div><div class="cb-footer-title">Products</div>' +
                    '<a href="#/products">All Products</a>' +
                    '<a href="#/getting-started">Getting Started</a>' +
                    '<a href="#/changelog">Changelog</a>' +
                  '</div>' +
                  '<div><div class="cb-footer-title">Support</div>' +
                    '<a href="#/support">Support</a>' +
                    '<a href="#/faq">FAQ</a>' +
                    '<a href="#/problems">Troubleshooting</a>' +
                    '<a href="#/fxap">Asset Escrow</a>' +
                  '</div>' +
                  '<div><div class="cb-footer-title">Official Links</div>' +
                    '<a href="#/legal/license">Legal</a>' +
                    '<a href="https://discord.gg/hsx6AvBg5s" target="_blank" rel="noopener noreferrer">Discord</a>' +
                    '<a href="https://pichirin-cb.tebex.io/" target="_blank" rel="noopener noreferrer">Tebex Store</a>' +
                  '</div>' +
                '</div>' +
                '<div class="cb-footer-logos">' +
                  '<img src="assets/branding/cb.png"     alt="CB Studios">' +
                  '<img src="assets/branding/cfx.png"    alt="Cfx.re">' +
                  '<img src="assets/branding/esx.png"    alt="ESX">' +
                  '<img src="assets/branding/qbcore.png" alt="QBCore">' +
                  '<img src="assets/branding/qbox.png"   alt="Qbox">' +
                '</div>' +
              '</div>'
            );
          });
        }
      ]
    };
  </script>

  <!-- DOCSIFY & PLUGINS -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- PRISM SYNTAX HIGHLIGHTING -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

  <!-- BANNER CONFIG (external) -->
  <script src="products-config.js"></script>
  <script src="banner-config.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var loader = document.getElementById("page-loader");
      var app    = document.getElementById("app");
      var btn    = document.getElementById("scroll-toggle-btn");

      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("cb-theme", theme);
      }

      document.addEventListener("click", function (event) {
        var back = event.target.closest("[data-page-back]");
        if (back) {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            location.hash = "#/home";
          }
          return;
        }

        var toggle = event.target.closest(".theme-toggle");
        if (!toggle) return;
        var current = document.documentElement.getAttribute("data-theme") || "dark";
        setTheme(current === "dark" ? "light" : "dark");
      });

      function syncContentOffset() {
        var sidebar = document.querySelector(".sidebar");
        var isDesktop = window.matchMedia("(min-width: 769px)").matches;
        var isClosed = document.body.classList.contains("close");
        var offset = 0;

        if (isDesktop && sidebar && !isClosed) {
          offset = Math.round(sidebar.getBoundingClientRect().width);
        }

        document.documentElement.style.setProperty("--content-offset", offset + "px");
      }

      if (window.MutationObserver) {
        var bodyObserver = new MutationObserver(syncContentOffset);
        bodyObserver.observe(document.body, { attributes: true, attributeFilter: ["class"] });
      }

      window.addEventListener("resize", syncContentOffset);
      window.addEventListener("hashchange", function () { setTimeout(syncContentOffset, 0); });
      setTimeout(syncContentOffset, 0);
      setTimeout(syncContentOffset, 250);
      setTimeout(syncContentOffset, 1200);

      /* ── SCROLL BUTTON ── */
      if (btn) {
        btn.style.opacity = "0";
        function atBottom() {
          return window.innerHeight + window.scrollY >= document.body.offsetHeight - 4;
        }
        function syncBtn() {
          btn.textContent = atBottom() ? "↑" : "↓";
          btn.setAttribute("data-dir", atBottom() ? "up" : "down");
          btn.style.opacity = window.scrollY > 320 ? "1" : "0";
        }
        btn.addEventListener("click", function () {
          window.scrollTo({
            top: btn.getAttribute("data-dir") === "up" ? 0 : document.body.scrollHeight,
            behavior: "smooth"
          });
        });
        window.addEventListener("scroll",  syncBtn);
        window.addEventListener("resize",  syncBtn);
        syncBtn();
      }

      /* ── ANNOUNCEMENT BANNER ── */
      if (window.CB_BANNER_CONFIG) {
        var cfg = window.CB_BANNER_CONFIG;
        var bar = document.getElementById("announcement-bar");
        var dismissed = false;
        if (cfg.dismiss && cfg.dismiss.enabled && cfg.dismiss.storageKey) {
          dismissed = localStorage.getItem(cfg.dismiss.storageKey) === "dismissed";
        }

        function syncBannerHeight() {
          if (bar && bar.classList.contains("visible")) {
            document.documentElement.style.setProperty("--banner-h", bar.offsetHeight + "px");
          } else {
            document.documentElement.style.setProperty("--banner-h", "0px");
          }
          syncContentOffset();
        }

        if (cfg.enabled && bar && !dismissed) {
          bar.classList.add("announcement-bar--" + (cfg.type || "info"));

          var inner = document.createElement("div");
          inner.className = "announcement-inner announcement-inner--" + (cfg.layout || "compact") + " announcement-inner--" + (cfg.align || "center");

          var content = document.createElement("div");
          content.className = "announcement-content";

          if (cfg.icon) {
            var icon = document.createElement("span");
            icon.className = "announcement-icon";
            icon.textContent = cfg.icon;
            content.appendChild(icon);
          }

          var textBlock = document.createElement("div");
          textBlock.style.display = "flex";
          textBlock.style.alignItems = "center";
          textBlock.style.gap = "10px";
          textBlock.style.flexWrap = "wrap";

          if (cfg.title) {
            var title = document.createElement("span");
            title.className = "announcement-title";
            title.textContent = cfg.title;
            textBlock.appendChild(title);
          }

          if (cfg.subtitle) {
            var subtitle = document.createElement("span");
            subtitle.className = "announcement-subtitle";
            subtitle.innerHTML = cfg.subtitle;
            textBlock.appendChild(subtitle);
          }

          content.appendChild(textBlock);
          inner.appendChild(content);

          if (cfg.cta && cfg.cta.enabled && cfg.cta.label && cfg.cta.url) {
            var cta = document.createElement("a");
            cta.className = "announcement-cta";
            cta.href   = cfg.cta.url;
            cta.target = cfg.cta.target || "_blank";
            cta.rel    = "noopener";
            cta.textContent = cfg.cta.label;
            inner.appendChild(cta);
          }

          if (cfg.dismiss && cfg.dismiss.enabled) {
            var dismiss = document.createElement("button");
            dismiss.className = "announcement-dismiss";
            dismiss.type = "button";
            dismiss.setAttribute("aria-label", "Dismiss announcement");
            dismiss.textContent = "x";
            dismiss.addEventListener("click", function () {
              bar.classList.remove("visible");
              bar.innerHTML = "";
              if (cfg.dismiss.storageKey) localStorage.setItem(cfg.dismiss.storageKey, "dismissed");
              syncBannerHeight();
            });
            inner.appendChild(dismiss);
          }

          bar.appendChild(inner);
          bar.classList.add("visible");
          syncBannerHeight();
          window.addEventListener("resize", syncBannerHeight);
        }
      }

      function productMatches(product, filter) {
        if (!filter || filter === "all") return true;
        var category = product.category.toLowerCase();
        var frameworks = (product.frameworks || []).map(function (item) { return item.toLowerCase(); });
        if (filter === "paid") return product.type === "paid";
        if (filter === "free") return product.type === "free";
        if (filter === "scripts") return category.indexOf("script") !== -1 || category.indexOf("resource") !== -1;
        if (filter === "vehicles") return category.indexOf("vehicle") !== -1;
        if (filter === "audio") return category.indexOf("audio") !== -1;
        if (filter === "mlo") return category.indexOf("mlo") !== -1 || category.indexOf("mapping") !== -1;
        return frameworks.indexOf(filter.toLowerCase()) !== -1;
      }

      function productCard(product) {
        var typeBadge = product.type ? '<span class="product-badge product-badge--' + product.type + '">' + product.type + '</span>' : "";
        var frameworkBadges = (product.frameworks || []).slice(0, 4).map(function (fw) {
          return '<span class="product-badge">' + fw + '</span>';
        }).join("");
        var secondaryAction = product.storeUrl
          ? '<a class="docs-button docs-button--ghost" href="' + product.storeUrl + '" target="_blank" rel="noopener noreferrer">Store</a>'
          : '<a class="docs-button docs-button--ghost" href="#/support">Support</a>';
        return '' +
          '<article class="product-card" data-category="' + product.category + '">' +
            '<div class="product-badges">' +
              '<span class="product-badge product-badge--status">' + product.status + '</span>' +
              typeBadge +
              frameworkBadges +
            '</div>' +
            '<h3>' + product.name + '</h3>' +
            '<p>' + product.description + '</p>' +
            '<div class="product-actions">' +
              '<a class="docs-button docs-button--primary" href="#' + product.docPath + '">Docs</a>' +
              secondaryAction +
            '</div>' +
          '</article>';
      }

      function renderProducts() {
        var products = window.CB_PRODUCTS || [];
        var featured = document.getElementById("featured-products");
        if (featured && !featured.dataset.rendered) {
          featured.innerHTML = products.filter(function (item) { return item.featured; }).map(productCard).join("");
          featured.dataset.rendered = "true";
        }

        var productsApp = document.getElementById("products-app");
        if (!productsApp || productsApp.dataset.rendered) return;
        var filters = ["all", "paid", "free", "scripts", "vehicles", "audio", "mlo", "QBCore", "ESX", "Standalone"];
        productsApp.innerHTML =
          '<div class="filter-bar">' +
            filters.map(function (filter) {
              return '<button class="filter-button" type="button" data-filter="' + filter.toLowerCase() + '">' + filter + '</button>';
            }).join("") +
          '</div>' +
          '<div class="product-grid" id="products-grid"></div>';
        productsApp.dataset.rendered = "true";

        var grid = document.getElementById("products-grid");
        function applyFilter(filter) {
          var normalized = (filter || "all").toLowerCase();
          grid.innerHTML = products.filter(function (product) { return productMatches(product, normalized); }).map(productCard).join("");
          productsApp.querySelectorAll(".filter-button").forEach(function (button) {
            button.classList.toggle("active", button.dataset.filter === normalized);
          });
        }
        productsApp.addEventListener("click", function (event) {
          var button = event.target.closest(".filter-button");
          if (button) applyFilter(button.dataset.filter);
        });
        var hashFilter = (location.hash.match(/[?&]filter=([^&]+)/) || [])[1];
        applyFilter(hashFilter || "all");
      }

      function enhanceCodeBlocks() {
        document.querySelectorAll(".markdown-section pre code").forEach(function (code) {
          var pre = code.parentElement;
          if (!pre || pre.dataset.lang) return;
          var match = (code.className || "").match(/language-([a-z0-9_-]+)/i);
          pre.dataset.lang = match ? match[1] : "code";
        });
      }

      var scrollStorageKey = "cb-scroll-positions";
      var currentRoute = location.hash || "#/home";
      if ("scrollRestoration" in history) history.scrollRestoration = "manual";

      function readScrollPositions() {
        try {
          return JSON.parse(localStorage.getItem(scrollStorageKey) || "{}");
        } catch (error) {
          return {};
        }
      }

      function writeScrollPositions(positions) {
        try {
          var keys = Object.keys(positions);
          if (keys.length > 80) {
            keys.slice(0, keys.length - 80).forEach(function (key) {
              delete positions[key];
            });
          }
          localStorage.setItem(scrollStorageKey, JSON.stringify(positions));
        } catch (error) {}
      }

      function saveScrollPosition(route) {
        if (!route) return;
        var positions = readScrollPositions();
        positions[route] = {
          top: Math.max(0, Math.round(window.scrollY || window.pageYOffset || 0)),
          updatedAt: Date.now()
        };
        writeScrollPositions(positions);
      }

      function restoreScrollPosition(route) {
        var positions = readScrollPositions();
        var saved = positions[route];
        var top = saved && typeof saved.top === "number" ? saved.top : 0;
        setTimeout(function () {
          window.scrollTo({ top: top, left: 0, behavior: "auto" });
        }, 180);
        setTimeout(function () {
          window.scrollTo({ top: top, left: 0, behavior: "auto" });
        }, 520);
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          var active = document.activeElement;
          if (active && active.closest(".search")) active.blur();
        }
      });

      window.addEventListener("hashchange", function () {
        saveScrollPosition(currentRoute);
        currentRoute = location.hash || "#/home";
        setTimeout(function () {
          renderProducts();
          enhanceCodeBlocks();
          restoreScrollPosition(currentRoute);
        }, 120);
      });

      window.addEventListener("beforeunload", function () {
        saveScrollPosition(currentRoute);
      });

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") saveScrollPosition(currentRoute);
      });

      setTimeout(function () {
        renderProducts();
        enhanceCodeBlocks();
        restoreScrollPosition(currentRoute);
      }, 500);

      /* ── LOADER DISMISS ── */
      setTimeout(function () {
        if (loader) loader.classList.add("hidden");
        if (app) {
          app.classList.remove("app-hidden");
          app.classList.add("app-visible");
        }
      }, 1200);
    });
  </script>
</body>
